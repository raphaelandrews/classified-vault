root = "."
tmp_dir = "tmp"

[build]
  entrypoint = "./tmp/client"
  cmd = "go build -o ./tmp/client ./cmd/client"
  delay = 500
  include_ext = ["go"]
  include_dir = ["tui"]
  exclude_dir = ["tmp", "vendor", "testdata"]
  exclude_regex = ["_test.go"]
  kill_delay = "500ms"
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[screen]
  clear_on_rebuild = false
