services:
  - type: web
    name: classified-vault
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: ENV
        value: production
      - key: DATABASE_PATH
        value: /data/vault.db
    disk:
      name: vault-data
      mountPath: /data
      sizeGB: 1
